# Reference bitcoin.conf for a full-verification, non-pruning node.
# Place at /etc/bitcoin/bitcoin.conf (owned root:bitcoin, mode 0640).
# Generate rpcauth with: share/rpcauth/rpcauth.py <username>

# ---- Verification --------------------------------------------------------
# Full script verification from genesis. assumevalid=0 disables the
# optimization that skips signature checks up to a hardcoded block hash.
assumevalid=0

# Disable the assumeUTXO snapshot mechanism (Core 28+). Force a real IBD.
# (No flag needed unless you would otherwise invoke -loadtxoutset.)

# ---- No pruning, full retention ------------------------------------------
# prune=0 is the default; stated explicitly for clarity.
prune=0

# Keep the full transaction index and all auxiliary indexes.
txindex=1
coinstatsindex=1
blockfilterindex=1

# Serve everything to peers. NODE_NETWORK (not LIMITED).
# Default behavior when prune=0; no flag needed, listed for completeness.

# ---- Network -------------------------------------------------------------
listen=1
listenonion=1

# v2 transport (BIP324) — encrypted p2p. Default in recent Core.
v2transport=1

# Maximum peer slots. Raise if you have the bandwidth.
maxconnections=125

# ---- Mempool -------------------------------------------------------------
# Larger mempool = better fee visibility and relay. 1 GB is comfortable
# on a 64 GB machine; reduce if RAM is constrained.
maxmempool=1000
mempoolexpiry=336

# Permissive relay. Do NOT set if you want Knots-style filtering.
# datacarrier=1 and a high datacarriersize are Core defaults; Knots
# defaults these stricter. Set explicitly if you want Core-like relay
# even on Knots:
datacarrier=1
datacarriersize=100000
permitbaremultisig=1
minrelaytxfee=0.00001

# ---- Resources -----------------------------------------------------------
# dbcache in MiB. A large cache dramatically speeds up IBD.
# Use what you can spare during sync; lower it afterward if you want
# the RAM back (restart required).
dbcache=16000

# Use all CPU cores for script verification during IBD.
par=0

# ---- RPC -----------------------------------------------------------------
server=1
rpcbind=127.0.0.1
rpcallowip=127.0.0.1

# Generate with share/rpcauth/rpcauth.py; never put plaintext passwords here.
# Example: python3 share/rpcauth/rpcauth.py alice
# Paste the resulting rpcauth= line below and add the password to
# /etc/bitcoin/rpcpassword (read only by the bitcoin user).
rpcauth=<user>:<salt>$<hmac>

# ---- Logging -------------------------------------------------------------
debug=0
shrinkdebugfile=0
